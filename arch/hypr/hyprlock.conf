$wall = /home/ash/Pictures/Wallpaper/flower.jpg

general {
    immediate_render = true
    no_fade_in = true
    no_fade_out = true
    disable_loading_bar = false
    hide_cursor = false
    transparent = true
}


# BACKGROUND
background {
    path = $wall
    # color = rgba(255, 0, 0, 0)
    blur_passes = 0

}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I")</span>"
    color =rgb(240, 231, 219)
    font_size = 60
    font_family = TeachingPrintDotted-OVKlp
    position = -60, 400
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +":%M")</span>"
    color = rgb(214, 209, 209)
    font_size = 60
    font_family = TeachingPrintDotted-OVKlp
    position = 45, 400
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgb(200, 200, 200)
    font_size = 19
    font_family = TeachingPrintDotted-OVKlp
    position = 0, 340
    halign = center
    valign = center
}


# INPUT FIELD
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgb(221, 141, 141)
    font_color = rgba(248, 248, 248, 1)
    fade_on_empty = true
    placeholder_text = <i><span foreground="##ffffff99">   Enter passwd</span></i>
    hide_input = false
    position = 0, -390
    halign = center
    valign = center
    rounding = 15
}






