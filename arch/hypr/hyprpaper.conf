# Global settings
ipc = on
splash = false

# Preload images for faster switching
preload = /home/ash/Pictures/Wallpaper/fish.jpg

# Wallpaper blocks (new format required for hyprpaper v0.52+)
wallpaper {
    monitor = eDP-1
    path = /home/ash/Pictures/Wallpaper/fish.jpg
    fit_mode = cover
}

wallpaper {
    monitor = HDMI-A-1
    path = /home/ash/Pictures/Wallpaper/pink.jpg
    fit_mode = cover
}
